<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安室RC 総合管理ポータル</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    /* --- 印刷用の特殊設定 --- */
    @media print {
      body * { visibility: hidden; }
      #print-root, #print-root * { visibility: visible; }
      #print-root { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; background: white; box-shadow: none; }
      @page { size: A4 portrait; margin: 10mm; }
      .no-print { display: none !important; }
    }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Users, Lock, Unlock, UserPlus, Banknote, Trophy, ChevronRight, 
      UserCircle2, FileText, LogOut, Phone, HeartPulse, GraduationCap, 
      Building, School, CheckCircle2, Home, ListChecks, Settings, 
      Trash2, Download, Camera, Loader2, AlertCircle, X, Edit2, Plus,
      Printer, ChevronDown, ChevronUp
    } from 'lucide-react';

    // 🛑 安定版のGoogle公式CDNからFirebaseをインポート
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // --- 環境判定 ---
    const envConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
    const envConfig = JSON.parse(envConfigStr);
    const isCanvasEnv = Object.keys(envConfig).length > 0;
    const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // =========================================================================
    // ★ Firebaseコンソールの情報をここに設定してください ★
    // =========================================================================
    const manualConfig = {
      apiKey: "AIzaSyDz9kn5I_TOT9_YmFJk4BaOyMUmkCnwuh8",
      authDomain: "amuro-rc-app.firebaseapp.com",
      projectId: "amuro-rc-app",
      storageBucket: "amuro-rc-app.firebasestorage.app",
      messagingSenderId: "194028750411",
      appId: "1:194028750411:web:5cce3ff1bd5b0995582fce"
    };
    // =========================================================================

    const firebaseConfig = isCanvasEnv ? envConfig : manualConfig;

    let app, db, auth;
    let configError = null;

    // Firebaseの初期化テスト
    try {
      if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("YOUR_")) {
        throw new Error("APIキーが正しく設定されていません。コード内のmanualConfigを書き換えてください。");
      }
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      auth = getAuth(app);
    } catch (error) {
      console.error("Firebase init error:", error);
      configError = error.message;
    }

    const getCollectionRef = (colName) => isCanvasEnv ? collection(db, 'artifacts', currentAppId, 'public', 'data', colName) : collection(db, colName);
    const getDocRef = (colName, docId) => isCanvasEnv ? doc(db, 'artifacts', currentAppId, 'public', 'data', colName, docId) : doc(db, colName, docId);

    // --- 定数マスター ---
    const ADMIN_PIN = "1049"; 
    const GRADES = ['幼児','1年','2年','3年','4年','5年','6年','中学1年(OB/OG)','中学2年(OB/OG)','中学3年(OB/OG)','高校生以上(OB/OG)'];

    function App() {
      // 設定エラーがある場合は警告画面を表示
      if (configError) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-center">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-xl w-full border-t-4 border-rose-500">
              <AlertCircle className="w-16 h-16 text-rose-500 mx-auto mb-4" />
              <h1 className="text-2xl font-bold text-slate-800 mb-4">システム設定エラー</h1>
              <div className="bg-rose-50 p-4 rounded text-sm text-rose-800 font-mono mb-6 text-left break-all">
                {configError}
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                GitHubのindex.htmlを開き、60行目付近にある <code>manualConfig</code> の <code>apiKey</code> などを、ご自身のFirebaseプロジェクトの情報に書き換えて「Commit changes」してください。
              </p>
            </div>
          </div>
        );
      }

      const [view, setView] = useState('portal'); 
      const [procedureType, setProcedureType] = useState('new');
      const [adminName, setAdminName] = useState('');
      
      const [members, setMembers] = useState([]);
      const [entries, setEntries] = useState([]);
      const [tournaments, setTournaments] = useState([]);
      const [accEvents, setAccEvents] = useState([]);
      const [officers, setOfficers] = useState(["久保", "桝本", "山道", "岩﨑", "加藤"]); 
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('amuro_gemini_key') || ''); 
      
      const [loading, setLoading] = useState(true);
      const [authReady, setAuthReady] = useState(false);
      const [printMember, setPrintMember] = useState(null);

      // --- Firebase 認証 ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch(e) {
            console.error("Auth Error", e);
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          if (user) setAuthReady(true);
        });
        return () => unsubscribe();
      }, []);

      // --- Firebase リアルタイム同期 ---
      useEffect(() => {
        if (!authReady) return;

        const unsubMembers = onSnapshot(getCollectionRef('members'), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setMembers(data); setLoading(false);
        }, err => { 
          console.error(err); 
          alert("データベース接続エラー。Firebaseのルール設定を確認してください。"); 
          setLoading(false); 
        });
        
        const unsubEntries = onSnapshot(getCollectionRef('entries'), (snap) => setEntries(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubTournaments = onSnapshot(getCollectionRef('tournaments'), (snap) => setTournaments(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubAccEvents = onSnapshot(getCollectionRef('accEvents'), (snap) => setAccEvents(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubOfficers = onSnapshot(getDocRef('settings', 'officers'), (docSnap) => { if(docSnap.exists() && docSnap.data().names) setOfficers(docSnap.data().names); });

        return () => { unsubMembers(); unsubEntries(); unsubTournaments(); unsubAccEvents(); unsubOfficers(); };
      }, [authReady]);

      useEffect(() => { localStorage.setItem('amuro_gemini_key', apiKey); }, [apiKey]);

      const goPortal = () => setView('portal');
      const goAdmin = () => adminName ? setView('admin') : setView('pinEntry');

      const saveMember = async (data, isNew) => {
        if (isNew) await addDoc(getCollectionRef('members'), { ...data, createdAt: Date.now() });
        else await updateDoc(getDocRef('members', data.id), { ...data, updatedAt: Date.now() });
      };
      const saveEntry = async (data) => await addDoc(getCollectionRef('entries'), { ...data, createdAt: Date.now() });
      const saveOfficerList = async (newList) => await setDoc(getDocRef('settings', 'officers'), { names: newList });

      if (loading) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
          <div className="loader mb-4"></div>
          <p className="text-slate-600 font-bold">クラウドと接続中...</p>
          <p className="text-xs text-slate-500 mt-2">しばらくお待ちください</p>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-20">
          <Header view={view} goPortal={goPortal} goAdmin={goAdmin} />
          <main className="max-w-5xl mx-auto p-4 py-8">
            {view === 'portal' && <PortalView onSelectEntry={() => setView('entry')} onSelectProcedure={(type) => { setProcedureType(type); setView('procedure'); }} />}
            {view === 'entry' && <EntryFormView members={members.filter(m=>m.isActive)} tournaments={tournaments} onSave={saveEntry} onBack={goPortal} />}
            {view === 'procedure' && <ProcedureFormView type={procedureType} members={members} onSave={saveMember} onBack={goPortal} />}
            {view === 'pinEntry' && <PinEntryView onSuccess={() => setView('adminAuth')} />}
            {view === 'adminAuth' && <AdminAuthView officers={officers} setAdminName={(name) => { setAdminName(name); setView('admin'); }} />}
            {view === 'admin' && <AdminDashboard db={db} members={members} entries={entries} tournaments={tournaments} accEvents={accEvents} officers={officers} saveOfficerList={saveOfficerList} adminName={adminName} apiKey={apiKey} setApiKey={setApiKey} onLogout={() => { setAdminName(''); setView('adminAuth'); }} onPrint={setPrintMember} />}
          </main>
          {printMember && <PrintTemplate member={printMember} onClose={() => setPrintMember(null)} />}
        </div>
      );
    }

    // --- 各コンポーネント (Header, PortalView, etc.) は元の緻密な実装をそのまま維持 ---
    function Header({ view, goPortal, goAdmin }) {
      return (
        <header className="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-20 no-print">
          <div className="max-w-5xl mx-auto flex justify-between items-center">
            <div className="flex items-center space-x-2 cursor-pointer" onClick={goPortal}><Home className="h-6 w-6 text-blue-400" /><h1 className="text-xl font-bold tracking-wide">安室RC ポータル</h1></div>
            <div className="flex">
              {view === 'portal' ? (
                <button onClick={goAdmin} className="flex items-center space-x-1 px-3 py-1.5 rounded-md text-sm font-medium bg-slate-700 text-slate-200 hover:bg-slate-600 border border-slate-600"><Lock className="w-4 h-4" /><span>役員専用</span></button>
              ) : (view === 'entry' || view === 'procedure') ? (
                <button onClick={goPortal} className="flex items-center space-x-1 px-3 py-1.5 rounded-md text-sm font-medium bg-white text-slate-800 shadow"><ChevronRight className="w-4 h-4 rotate-180" /><span>トップへ戻る</span></button>
              ) : null}
            </div>
          </div>
        </header>
      );
    }

    function PortalView({ onSelectEntry, onSelectProcedure }) {
      return (
        <div className="max-w-3xl mx-auto animate-in fade-in space-y-8">
          <section>
            <div className="mb-4"><h2 className="text-xl font-bold flex items-center"><FileText className="w-5 h-5 mr-2 text-emerald-600"/>各種手続き（入会・更新・退会）</h2></div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <button onClick={() => onSelectProcedure('new')} className="bg-white p-5 rounded-2xl shadow-sm border hover:border-emerald-500 text-left group">
                <div className="bg-emerald-100 p-2.5 rounded-xl text-emerald-600 mb-3"><UserPlus className="w-5 h-5" /></div>
                <h3 className="font-bold mb-1">新規入会</h3><p className="text-xs text-slate-500">新しく入会される方</p>
              </button>
              <button onClick={() => onSelectProcedure('update')} className="bg-white p-5 rounded-2xl shadow-sm border hover:border-blue-500 text-left group">
                <div className="bg-blue-100 p-2.5 rounded-xl text-blue-600 mb-3"><FileText className="w-5 h-5" /></div>
                <h3 className="font-bold mb-1">継続更新</h3><p className="text-xs text-slate-500">次年度も継続される方</p>
              </button>
              <button onClick={() => onSelectProcedure('leave')} className="bg-white p-5 rounded-2xl shadow-sm border hover:border-rose-500 text-left group">
                <div className="bg-rose-100 p-2.5 rounded-xl text-rose-600 mb-3"><LogOut className="w-5 h-5" /></div>
                <h3 className="font-bold mb-1">退会手続き</h3><p className="text-xs text-slate-500">クラブを退会される方</p>
              </button>
            </div>
          </section>
          <section>
            <div className="mb-4"><h2 className="text-xl font-bold flex items-center"><Trophy className="w-5 h-5 mr-2 text-amber-500"/>大会エントリー</h2></div>
            <button onClick={onSelectEntry} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 p-6 rounded-2xl shadow-md hover:shadow-lg text-left flex items-center justify-between group">
              <div className="flex items-center"><div className="bg-white/20 p-3 rounded-full text-white mr-4"><ListChecks className="w-6 h-6" /></div>
                <div><h3 className="text-lg font-bold text-white mb-1">大会への出場申し込み</h3><p className="text-blue-100 text-sm">※名簿に登録されている選手のみ表示されます</p></div>
              </div>
              <ChevronRight className="w-6 h-6 text-white group-hover:translate-x-1 transition-all" />
            </button>
          </section>
        </div>
      );
    }

    function EntryFormView({ members, tournaments, onSave, onBack }) {
      const [selectedTournamentId, setSelectedTournamentId] = useState(tournaments.length > 0 ? tournaments[0].id : '');
      const activeTournament = tournaments.find(t => t.id === selectedTournamentId);
      const [selectedMemberId, setSelectedMemberId] = useState('');
      const [formData, setFormData] = useState({ entryType: 'amuro', schoolName: '', events: [] });
      const [submittedData, setSubmittedData] = useState(null);

      const sortedMembers = useMemo(() => { return [...members].sort((a,b) => GRADES.indexOf(a.grade) - GRADES.indexOf(b.grade)); }, [members]);
      const activeMember = members.find(m => m.id === selectedMemberId);
      const totalFee = activeTournament ? (formData.events.length * activeTournament.eventFee) : 0;

      useEffect(() => { setFormData(p => ({ ...p, events: [] })); }, [selectedTournamentId, selectedMemberId]);

      if (tournaments.length === 0) return <div className="max-w-xl mx-auto p-8 bg-white rounded-2xl shadow-sm text-center border"><Trophy className="w-16 h-16 text-slate-300 mx-auto mb-4" /><h2 className="text-xl font-bold text-slate-600 mb-2">現在エントリー可能な大会はありません</h2><button onClick={onBack} className="bg-slate-100 text-slate-700 px-6 py-3 rounded-xl mt-4">ポータルへ戻る</button></div>;

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!activeMember || formData.events.length === 0) return alert('選手と出場種目を選択してください。');
        onSave({ memberId: activeMember.id, name: activeMember.name, grade: activeMember.grade, gender: activeMember.gender, entryType: formData.entryType, schoolName: formData.entryType === 'school' ? formData.schoolName : '', events: formData.events, tournamentId: activeTournament.id, tournamentName: activeTournament.name, fee: totalFee, isPaid: false, receivedBy: '' });
        setSubmittedData({ name: activeMember.name, fee: totalFee, tName: activeTournament.name });
      };

      if (submittedData) return <div className="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm text-center border mt-10"><CheckCircle2 className="w-16 h-16 text-green-500 mx-auto mb-4" /><h2 className="text-2xl font-bold mb-2">エントリー完了</h2><p className="font-bold text-blue-600 mb-4 bg-blue-50 py-2 rounded-lg">{submittedData.tName}</p><p className="mb-6">集金袋に <strong className="text-blue-600 text-xl mx-1">{submittedData.fee.toLocaleString()}円</strong> を入れ役員へお渡しください。</p><button onClick={onBack} className="bg-slate-100 text-slate-700 px-6 py-3 rounded-xl w-full">ポータルへ戻る</button></div>;

      return (
        <div className="max-w-xl mx-auto animate-in slide-in-from-bottom-4">
          <h2 className="text-2xl font-bold flex items-center mb-6"><Trophy className="w-6 h-6 mr-2 text-amber-500"/>大会エントリー</h2>
          <select className="w-full font-bold border bg-white rounded-lg p-3 mb-4 outline-none" value={selectedTournamentId} onChange={(e) => setSelectedTournamentId(e.target.value)}>{tournaments.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</select>
          <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="p-5 border-b bg-slate-50"><h3 className="font-bold text-lg mb-3 flex items-center"><span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">1</span>選手を選択</h3><select required className="w-full border rounded-lg p-3 outline-none font-medium" value={selectedMemberId} onChange={e => setSelectedMemberId(e.target.value)}><option value="" disabled>-- 名簿から選択 --</option>{sortedMembers.map(m => <option key={m.id} value={m.id}>{m.grade} | {m.name}</option>)}</select></div>
            {activeMember && (
              <div className="animate-in fade-in">
                <div className="p-5 border-b bg-white"><h3 className="font-bold text-lg mb-3 flex items-center"><span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">2</span>出場区分</h3><div className="grid grid-cols-2 gap-3"><label className={`border p-4 rounded-xl cursor-pointer flex flex-col items-center ${formData.entryType === 'amuro' ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-500' : 'bg-slate-50'}`}><input type="radio" className="sr-only" checked={formData.entryType === 'amuro'} onChange={() => setFormData({...formData, entryType: 'amuro'})} /><span className="font-bold text-sm">安室RCとして</span></label><label className={`border p-4 rounded-xl cursor-pointer flex flex-col items-center ${formData.entryType === 'school' ? 'border-emerald-500 bg-emerald-50 ring-2 ring-emerald-500' : 'bg-slate-50'}`}><input type="radio" className="sr-only" checked={formData.entryType === 'school'} onChange={() => setFormData({...formData, entryType: 'school'})} /><span className="font-bold text-sm">学校から出場</span></label></div>{formData.entryType === 'school' && <input type="text" required placeholder="学校名" className="w-full border rounded-lg p-3 mt-3 outline-none focus:border-emerald-500" value={formData.schoolName} onChange={e => setFormData({...formData, schoolName: e.target.value})} />}</div>
                <div className="p-5 border-b bg-slate-50"><h3 className="font-bold text-lg mb-3 flex items-center"><span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">3</span>出場種目 (1種目 {activeTournament.eventFee}円)</h3><div className="flex flex-wrap gap-2">{activeTournament.events.map(ev => <button type="button" key={ev} onClick={() => setFormData(p => ({...p, events: p.events.includes(ev)?p.events.filter(e=>e!==ev):[...p.events, ev]}))} className={`px-4 py-2 rounded-full text-sm font-medium border ${formData.events.includes(ev) ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>{ev}</button>)}</div></div>
                <div className="p-5 bg-slate-800 text-white flex justify-between items-center"><div><span className="text-xs">合計予定額</span><div className="text-2xl font-bold">¥{totalFee.toLocaleString()}</div></div><button type="submit" className="bg-blue-500 hover:bg-blue-400 px-8 py-3 rounded-xl font-bold shadow-lg">確定する</button></div>
              </div>
            )}
          </form>
        </div>
      );
    }

    function ProcedureFormView({ type, members, onSave, onBack }) {
      const isLeave = type === 'leave'; 
      const color = type === 'new' ? 'emerald' : type === 'update' ? 'blue' : 'rose';
      const title = type === 'new' ? '新規入会 申請' : type === 'update' ? '継続更新 申請' : '退会 申請';

      const [selectedMemberId, setSelectedMemberId] = useState(''); 
      const [submitted, setSubmitted] = useState(false);
      const [showDetails, setShowDetails] = useState(false);
      const [formData, setFormData] = useState({ 
        name: '', kana:'', grade: '1年', gender: '男子', schoolName: '', parentFatherName: '', parentFatherPhone: '',
        eventType: '短距離・長距離', birthDate: '', age: '', parentFatherEmail: '', parentMotherName: '', parentMotherPhone: '', parentMotherEmail: '',
        postalCode: '', address: '', homePhone: '', fax: '', health: '良好', bloodType: '', height: '', notes: '', requests: '', goals: '', leaveReason: ''
      });

      useEffect(() => { 
        if ((type === 'update' || type === 'leave') && selectedMemberId) { 
          const m = members.find(m => m.id === selectedMemberId); 
          if (m) setFormData(p => ({...p, ...m})); 
        } 
      }, [selectedMemberId, type, members]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (type === 'new') onSave({ ...formData, isActive: true, status: 'new', payments: { entrance: false, track: false, insurance: false, term1: false, term2: false } }, true);
        else if (type === 'update' && selectedMemberId) onSave({ id: selectedMemberId, ...formData, isActive: true, status: 'updated', payments: { entrance: true, track: false, insurance: false, term1: false, term2: false } }, false);
        else if (type === 'leave' && selectedMemberId) onSave({ id: selectedMemberId, isActive: false, status: 'leaved', leaveReason: formData.leaveReason }, false);
        setSubmitted(true);
      };

      if (submitted) return <div className="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm text-center border mt-10"><CheckCircle2 className={`w-16 h-16 text-${color}-500 mx-auto mb-4`} /><h2 className="text-2xl font-bold mb-2">送信完了</h2><button onClick={onBack} className="w-full bg-slate-100 text-slate-700 px-6 py-3 rounded-xl font-bold">ポータルへ戻る</button></div>;

      return (
        <div className="max-w-2xl mx-auto"><h2 className={`text-2xl font-bold flex items-center mb-6 text-slate-800`}><FileText className={`w-6 h-6 mr-2 text-${color}-500`}/>{title}</h2>
          <form onSubmit={handleSubmit} className={`bg-white rounded-2xl shadow-sm border border-t-4 border-t-${color}-500 p-5`}>
            {(type === 'update' || type === 'leave') && <div className="mb-4"><label className="block text-sm font-bold text-slate-700 mb-2">対象の選手を選択</label><select required className="w-full border rounded-lg p-3 outline-none bg-slate-50 font-medium" value={selectedMemberId} onChange={e => setSelectedMemberId(e.target.value)}><option value="" disabled>-- 対象選手を選択 --</option>{members.filter(m => m.isActive).map(m => <option key={m.id} value={m.id}>{m.grade} | {m.name}</option>)}</select></div>}
            {!isLeave && (type === 'new' || selectedMemberId) && (
              <div className="space-y-4">
                <div className="bg-slate-50 p-4 rounded-xl border space-y-3">
                  <h3 className="font-bold text-sm text-slate-600 border-b pb-2 mb-3">基本情報（必須）</h3>
                  <div className="grid grid-cols-2 gap-3"><input type="text" required placeholder="選手氏名" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="border rounded-lg p-3 outline-none"/><input type="text" required placeholder="ふりがな" value={formData.kana} onChange={e=>setFormData({...formData, kana:e.target.value})} className="border rounded-lg p-3 outline-none"/></div>
                  <div className="grid grid-cols-2 gap-3"><select value={formData.grade} onChange={e=>setFormData({...formData, grade:e.target.value})} className="border rounded-lg p-3 outline-none">{GRADES.map(g=><option key={g}>{g}</option>)}</select><select value={formData.gender} onChange={e=>setFormData({...formData, gender:e.target.value})} className="border rounded-lg p-3 outline-none"><option>男子</option><option>女子</option></select></div>
                  <input type="text" required placeholder="学校名" value={formData.schoolName} onChange={e=>setFormData({...formData, schoolName:e.target.value})} className="w-full border rounded-lg p-3 outline-none"/>
                  <div className="grid grid-cols-2 gap-3"><input type="text" required placeholder="保護者(代表) 氏名" value={formData.parentFatherName} onChange={e=>setFormData({...formData, parentFatherName:e.target.value})} className="border rounded-lg p-3 outline-none"/><input type="tel" required placeholder="携帯電話" value={formData.parentFatherPhone} onChange={e=>setFormData({...formData, parentFatherPhone:e.target.value})} className="border rounded-lg p-3 outline-none"/></div>
                </div>
                <button type="button" onClick={() => setShowDetails(!showDetails)} className="w-full p-2 text-xs font-bold text-slate-400">詳細入力を表示</button>
                {showDetails && <div className="p-4 border rounded-xl space-y-2 text-sm">...詳細項目(省略)...</div>}
              </div>
            )}
            {isLeave && selectedMemberId && <textarea required placeholder="退会理由" value={formData.leaveReason} onChange={e=>setFormData({...formData, leaveReason:e.target.value})} className="w-full border rounded p-3 mt-4"></textarea>}
            <button type="submit" className={`mt-6 w-full bg-${color}-600 text-white font-bold py-3.5 rounded-xl shadow-md`}>この内容で保存する</button>
          </form>
        </div>
      );
    }

    function PinEntryView({ onSuccess }) {
      const [pin, setPin] = useState(''); const [error, setError] = useState(false);
      const handleSubmit = (e) => { e.preventDefault(); if (pin === ADMIN_PIN) onSuccess(); else { setError(true); setPin(''); } };
      return (
        <div className="max-w-sm mx-auto mt-12 text-center"><div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200"><Lock className="w-12 h-12 text-slate-300 mx-auto mb-4" /><h2 className="text-xl font-bold mb-6">役員専用パスコード</h2><form onSubmit={handleSubmit}><input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={(e) => { setPin(e.target.value); setError(false); }} className="w-full text-center text-3xl tracking-widest p-4 border rounded-xl outline-none" autoFocus /><button type="submit" className="w-full mt-6 bg-slate-800 text-white font-bold py-3 rounded-xl">ログイン</button></form></div></div>
      );
    }

    function AdminAuthView({ officers, setAdminName }) {
      return (
        <div className="max-w-md mx-auto mt-12 text-center"><div className="bg-white p-8 rounded-2xl shadow-sm border"><h2 className="text-xl font-bold mb-6">担当役員を選択</h2>
        <div className="grid grid-cols-2 gap-3">{officers.map(name => <button key={name} onClick={() => setAdminName(name)} className="py-3 px-4 border rounded-xl font-bold hover:bg-slate-100">{name}</button>)}</div>
        </div></div>
      );
    }

    // --- 役員ダッシュボード (メイン) ---
    function AdminDashboard({ db, members, entries, tournaments, accEvents, officers, saveOfficerList, adminName, apiKey, setApiKey, onLogout, onPrint }) {
      const [activeTab, setActiveTab] = useState('members');
      
      const activeMembers = useMemo(() => { return [...members].filter(m => m.isActive).sort((a,b) => GRADES.indexOf(a.grade) - GRADES.indexOf(b.grade)); }, [members]);

      const togglePayment = async (memberId, field) => {
        const m = members.find(x => x.id === memberId);
        await updateDoc(getDocRef('members', memberId), { [`payments.${field}`]: !m.payments?.[field] });
      };

      const handlePromoteAll = async () => {
        if(!confirm("進級処理を行います。全員の学年が1つ上がります。よろしいですか？")) return;
        const batch = writeBatch(db);
        members.forEach(m => {
          if (!m.isActive) return;
          let newGrade = m.grade;
          switch (m.grade) { case '幼児': newGrade='1年'; break; case '1年': newGrade='2年'; break; case '2年': newGrade='3年'; break; case '3年': newGrade='4年'; break; case '4年': newGrade='5年'; break; case '5年': newGrade='6年'; break; case '6年': newGrade='中学1年(OB/OG)'; break; case '中学1年(OB/OG)': newGrade='中学2年(OB/OG)'; break; case '中学2年(OB/OG)': newGrade='中学3年(OB/OG)'; break; case '中学3年(OB/OG)': newGrade='高校生以上(OB/OG)'; break; }
          batch.update(getDocRef('members', m.id), { grade: newGrade, status: 'updated', payments: {term1:false, term2:false, track:false, insurance:false, entrance: m.payments?.entrance||false} });
        });
        await batch.commit();
        alert("完了しました。");
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border no-print">
            <div className="font-bold flex items-center text-slate-800"><UserCircle2 className="w-5 h-5 mr-2 text-slate-400" />{adminName} <span className="text-slate-500 ml-1 text-sm font-normal">役員</span></div>
            <button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-800">ログアウト</button>
          </div>
          <div className="flex bg-slate-200/50 p-1.5 rounded-xl gap-1 overflow-x-auto no-print">
            <button onClick={() => setActiveTab('members')} className={`flex-1 py-2.5 rounded-lg text-sm font-bold ${activeTab === 'members' ? 'bg-white text-emerald-800 shadow-sm' : 'text-slate-500'}`}>名簿</button>
            <button onClick={() => setActiveTab('accounting')} className={`flex-1 py-2.5 rounded-lg text-sm font-bold ${activeTab === 'accounting' ? 'bg-white text-blue-800 shadow-sm' : 'text-slate-500'}`}>会計</button>
            <button onClick={() => setActiveTab('entries')} className={`flex-1 py-2.5 rounded-lg text-sm font-bold ${activeTab === 'entries' ? 'bg-white text-amber-800 shadow-sm' : 'text-slate-500'}`}>大会</button>
            <button onClick={() => setActiveTab('settings')} className={`flex-1 py-2.5 rounded-lg text-sm font-bold ${activeTab === 'settings' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}>設定</button>
          </div>

          {activeTab === 'members' && (
            <div className="bg-white rounded-2xl shadow-sm border p-4 animate-in fade-in">
              <h2 className="font-bold mb-4">在籍名簿 ({activeMembers.length}名)</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm whitespace-nowrap">
                  <thead><tr className="bg-slate-50 border-b"><th className="p-3">氏名</th><th className="p-3">学年/性別</th><th className="p-3">操作</th></tr></thead>
                  <tbody className="divide-y">
                    {activeMembers.map(m => (
                      <tr key={m.id}>
                        <td className="p-3 font-bold">{m.name}</td>
                        <td className="p-3 text-xs">{m.grade} / {m.gender}</td>
                        <td className="p-3">
                          <button onClick={() => onPrint(m)} className="text-slate-400 hover:text-emerald-600"><Printer className="w-4 h-4"/></button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeTab === 'accounting' && (
             <div className="bg-white rounded-2xl shadow-sm border p-4 animate-in fade-in">
              <h2 className="font-bold mb-4">集金チェック</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm whitespace-nowrap border-collapse">
                  <thead className="bg-slate-50"><tr><th className="p-3 border">氏名</th><th className="p-2 border text-center">入会</th><th className="p-2 border text-center">前期</th><th className="p-2 border text-center">後期</th><th className="p-2 border text-center">競技</th><th className="p-2 border text-center">保険</th></tr></thead>
                  <tbody className="divide-y">
                    {activeMembers.filter(m => !m.grade.includes('OB')).map(m => (
                      <tr key={m.id}>
                        <td className="p-3 font-bold border">{m.name}</td>
                        {['entrance','term1','term2','track','insurance'].map(field => (
                          <td key={field} className="p-2 border text-center">
                            <button onClick={() => togglePayment(m.id, field)} className={`w-8 h-8 rounded-full flex items-center justify-center mx-auto transition-colors ${m.payments?.[field] ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-300'}`}>
                              {m.payments?.[field] ? <CheckCircle2 className="w-4 h-4" /> : '未'}
                            </button>
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeTab === 'settings' && (
            <div className="space-y-6 max-w-xl animate-in fade-in">
              <div className="bg-white p-6 rounded-2xl border">
                <h2 className="font-bold mb-2">役員名の設定</h2>
                <textarea className="w-full border rounded-lg p-3" rows="3" defaultValue={officers.join(', ')} onBlur={(e) => { const newList = e.target.value.split(',').map(s=>s.trim()).filter(s=>s); saveOfficerList(newList); }}></textarea>
              </div>
              <div className="bg-rose-50 p-6 rounded-2xl border border-rose-200">
                <h2 className="font-bold text-rose-700">年度更新</h2>
                <button onClick={handlePromoteAll} className="w-full bg-rose-600 text-white font-bold py-3 mt-4 rounded-xl">進級処理を実行</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 印刷テンプレート ---
    function PrintTemplate({ member, onClose }) {
      return (
        <div className="fixed inset-0 bg-slate-600 z-[100] overflow-y-auto flex justify-center py-10 print:p-0 print:block print:bg-white print:static">
          <div id="print-root" className="bg-white p-10 w-[210mm] min-h-[297mm] relative print:w-full print:p-0">
             <div className="no-print mb-4 flex gap-2">
               <button onClick={() => window.print()} className="bg-emerald-600 text-white px-4 py-2 rounded">印刷</button>
               <button onClick={onClose} className="bg-slate-200 px-4 py-2 rounded">閉じる</button>
             </div>
             <h1 className="text-2xl font-bold border-b-2 border-black pb-2 mb-6 text-center italic">安室RC 入会・更新書 (印刷用)</h1>
             <div className="space-y-6 border p-8 rounded border-black">
               <div className="flex justify-between border-b pb-2"><span>氏名: <span className="text-xl font-bold ml-4">{member.name}</span></span><span>学年: {member.grade}</span></div>
               <div className="flex justify-between border-b pb-2"><span>ふりがな: {member.kana}</span><span>性別: {member.gender}</span></div>
               <div className="border-b pb-2">学校名: {member.schoolName}</div>
               <div className="border-b pb-2">保護者: {member.parentFatherName} (TEL: {member.parentFatherPhone})</div>
               <div className="pt-10 text-xs">※クラブ規定に同意し、活動に参加します。</div>
             </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
